<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" /> <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" /> </linearGradient>
    
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="rgba(0,0,0,0.2)"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="120" ry="120" fill="url(#brandGradient)" />

  <g fill="white" font-family="'Courier New', monospace" font-weight="bold" text-anchor="middle" font-size="180" filter="url(#dropShadow)">
    <text x="100" y="320">&lt;</text>
    
    <text x="256" y="320" letter-spacing="-10">AD</text>
    
    <text x="430" y="320">/&gt;</text>
  </g>
</svg>