<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Brand Gradient -->
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

    <!-- Background vignette -->
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#111"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>

    <!-- Drop shadow utama -->
    <filter id="dropShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(0,0,0,0.8)"/>
    </filter>

    <!-- Inner glow teks -->
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#bgGlow)" />

  <!-- Decorative tool icons -->
  <g fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.08)" stroke-width="1">

    <!-- Gear -->
    <g transform="translate(85 85) scale(1.1)">
      <path d="M30,15 L30,5 L20,5 L18,11 L12,8 L8,12 L11,18 L5,20 L5,30 L11,32 L8,38 L12,42 L18,39 L20,45 L30,45 L32,39 L38,42 L42,38 L39,32 L45,30 L45,20 L39,18 L42,12 L38,8 L32,11 Z"/>
      <circle cx="25" cy="25" r="7" fill="#000"/>
    </g>

    <!-- Terminal -->
    <g transform="translate(365 80)">
      <rect width="60" height="42" rx="6"/>
      <text x="8" y="27" font-family="Courier New, monospace" font-size="18" fill="#000" font-weight="bold">&gt;_</text>
    </g>

    <!-- Wrench -->
    <g transform="translate(85 400) rotate(-18)">
      <path d="M15,0 C7,0 0,7 0,15 C0,20 3,25 7,27 L7,45 L14,45 L14,38 L18,38 L18,45 L25,45 L25,27 C29,25 32,20 32,15 C32,7 25,0 17,0 Z"/>
    </g>
  </g>

  <!-- Main Logo Text -->
  <g font-family="Courier New, monospace"
     font-weight="900"
     text-anchor="middle"
     font-size="180"
     fill="url(#brandGradient)"
     filter="url(#dropShadow)">

    <text x="110" y="320">&lt;</text>
    <text x="256" y="320" letter-spacing="-14" filter="url(#innerGlow)">AD</text>
    <text x="420" y="320">/&gt;</text>
  </g>
</svg>
